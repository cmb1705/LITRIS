name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-core:
    name: Windows Core Workflow
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run linting
        run: |
          ruff check src/ tests/ scripts/

      - name: Run targeted mypy
        run: |
          python -m mypy --follow-imports=silent src/indexing/semantic_jobs.py src/analysis/batch_client.py src/analysis/openai_batch_client.py scripts/dimensions.py scripts/batch_extract.py scripts/batch_loop.py

      - name: Run workflow smoke commands
        run: |
          python scripts/build_index.py --help
          python scripts/dimensions.py batch plan --help
          python scripts/batch_extract.py --help
          python scripts/batch_loop.py --help
          python scripts/preflight_analysis.py --help
          python scripts/manage_opendataloader_hybrid.py --help

      - name: Run tests
        run: |
          pytest --tb=short -q
