# Starter semantic dimension profile cloned from the built-in
# legacy_semantic_v1 profile.
#
# Recommended workflow:
# 1. Keep this file as your editable baseline.
# 2. Change profile_id, title, and summary if you want a different long-lived profile.
# 3. Edit question text, add dimensions, disable dimensions, or move them between sections.
# 4. Run scripts/dimensions.py diff and backfill against your live index.
#
# Important:
# - Keep dimension ids stable once you have indexed data with them.
# - Use new ids for genuinely new dimensions.
# - Use enabled: false to retire a dimension without deleting stored answers.

profile_id: "stp_cas_v1"
version: "1.0.0"
title: "STP CAS Profile Starter"
summary: "Editable starter profile based on the legacy 40-dimension semantic analysis schema."

sections:
  - id: "research_core"
    label: "Pass 1: Research Core"
    prompt_label: "Pass 1: Research Core"
    order: 1
    aliases:
      - "pass_1"
      - "research"

  - id: "methodology"
    label: "Pass 2: Methodology"
    prompt_label: "Pass 2: Methodology"
    order: 2
    aliases:
      - "pass_2"
      - "methods"

  - id: "context"
    label: "Pass 3: Context & Discourse"
    prompt_label: "Pass 3: Context & Discourse"
    order: 3
    aliases:
      - "pass_3"

  - id: "meta"
    label: "Pass 4: Meta & Audience"
    prompt_label: "Pass 4: Meta & Audience"
    order: 4
    aliases:
      - "pass_4"

  - id: "scholarly"
    label: "Pass 5: Scholarly Positioning"
    prompt_label: "Pass 5: Scholarly Positioning"
    order: 5
    aliases:
      - "pass_5"
      - "synthesis"

  - id: "impact"
    label: "Pass 6: Impact, Gaps & Domain"
    prompt_label: "Pass 6: Impact, Gaps & Domain"
    order: 6
    aliases:
      - "pass_6"

roles:
  - id: "research_question"
    aliases: ["q01"]
  - id: "thesis"
    aliases: ["q02"]
  - id: "key_claims"
    aliases: ["q03"]
  - id: "evidence"
    aliases: ["q04"]
