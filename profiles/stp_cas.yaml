  - id: "field"
    aliases: ["q17"]
  - id: "implications"
    aliases: ["q19"]
  - id: "future_work"
    aliases: ["q20"]
  - id: "quality"
    aliases: ["q21"]
  - id: "contribution"
    aliases: ["q22"]

