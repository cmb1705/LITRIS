# Literature Review Index System (LITRIS) Configuration
# Copy this file to config.yaml and customize for your environment.
#
# Schema version - do not modify manually. The system will auto-migrate
# older configs to newer versions when loaded.
version: "1.2.0"

# =============================================================================
# Reference Source Configuration
# =============================================================================
# LITRIS supports multiple reference sources:
# - Zotero (default): Uses local Zotero database
# - BibTeX: Imports from .bib files
# - PDF Folder: Scans folders of PDF files
# - Mendeley: Uses local Mendeley database
# - EndNote: Imports from EndNote XML
# - Paperpile: Imports from Paperpile BibTeX export

zotero:
  # Path to Zotero SQLite database
  # Windows: C:/Users/YOUR_USERNAME/Zotero/zotero.sqlite
  # macOS: /Users/YOUR_USERNAME/Zotero/zotero.sqlite
  # Linux: /home/YOUR_USERNAME/Zotero/zotero.sqlite
  database_path: "/path/to/Zotero/zotero.sqlite"

  # Path to Zotero storage directory containing PDFs
  # Windows: C:/Users/YOUR_USERNAME/Zotero/storage
  # macOS: /Users/YOUR_USERNAME/Zotero/storage
  # Linux: /home/YOUR_USERNAME/Zotero/storage
  storage_path: "/path/to/Zotero/storage"

# =============================================================================
# LLM Extraction Configuration
# =============================================================================
extraction:
  # Default LLM provider: "anthropic", "openai", "google", "ollama", "llamacpp"
  provider: "anthropic"

  # Default extraction mode:
  # - "cli": Free with Claude Max / ChatGPT Pro subscription
  # - "api": Direct API calls (requires API key, pay-per-use)
  # - "batch_api": Anthropic batch API (50% discount, async processing)
  mode: "cli"

  # Maximum tokens per paper (papers exceeding this are truncated)
  max_tokens: 100000

  # Default timeout in seconds for extraction requests
  timeout: 120

  # Enable extraction caching (recommended)
  use_cache: true

  # Number of parallel workers for batch processing
  parallel_workers: 1

  # Per-provider settings (override defaults when --provider selects them)
  # Each provider section can specify: model, mode, effort, reasoning_effort, timeout
  providers:
    anthropic:
      model: "claude-opus-4-6"
      effort: "high"           # Extended thinking: low, medium, high
    openai:
      model: "gpt-5.4"
      reasoning_effort: "xhigh"  # none, low, medium, high, xhigh
    google:
      model: "gemini-2.5-flash"
    # ollama:
    #   model: "llama3"
    # llamacpp:
    #   model: "/path/to/model.gguf"

  # Model overrides by item type (optional)
  # Use different models for different document types to optimize cost/quality
  # model_overrides:
  #   journal_article: claude-sonnet-4-6
  #   book: claude-opus-4-6
  #   thesis: claude-opus-4-6
  #   conference_paper: gemini-2.5-flash
  #   preprint: gemini-2.5-flash

# =============================================================================
# Semantic Dimension Profiles
# =============================================================================
dimensions:
  # Active dimension profile id. The built-in legacy profile preserves the
  # historical 40-dimension/qNN behavior for existing indexes.
  active_profile: "legacy_semantic_v1"

  # Additional YAML/JSON profile definitions to load at runtime.
  # profile_paths:
  #   - "./profiles/sts_policy.yaml"
  profile_paths: []

  # Require explicit approval before applying proposals generated by
  # scripts/dimensions.py suggest.
  approval_required: true

  # Number of papers sampled when generating dimension proposals.
  suggestion_sample_size: 25

  # Maximum number of proposals emitted by scripts/dimensions.py suggest.
  suggestion_max_proposals: 5

  # Number of similarity neighbors to use per sampled paper when building
  # semantic suggestion evidence from similarity_pairs.json.
  suggestion_neighbor_count: 3

  # Enable the optional LLM-driven proposal generator. When false, suggest runs
  # in heuristic-only mode.
  suggestion_use_llm: true

# =============================================================================
# Embedding Model Configuration
# =============================================================================
embeddings:
  # Sentence transformer model for semantic search embeddings
  # Default is fast and effective for academic text
  model: "sentence-transformers/all-MiniLM-L6-v2"

  # Embedding dimension (must match the model's output dimension)
  dimension: 384

# =============================================================================
# Storage Configuration
# =============================================================================
storage:
  # ChromaDB vector database persistence directory
  chroma_path: "data/chroma"

  # Extraction cache directory (stores LLM extraction results)
  cache_path: "data/cache"

  # Collection name in ChromaDB
  collection_name: "literature_review"

  # Optional. Override the index output directory where LITRIS writes
  # semantic_analyses.json, dimension_profile.json, similarity pairs,
  # dimension proposals, extraction manifests, and checkpoints.
  # If unset, defaults to <project_root>/data/index.
  # Relative paths resolve to the directory containing this config.yaml.
  # Use this to keep a project-specific index out of the main LITRIS repo.
  # index_path: "data/index"

# =============================================================================
# Processing Configuration
# =============================================================================
processing:
  # Number of papers to process in each batch
  batch_size: 10

  # Enable OCR fallback for scanned PDFs
  # Requires Tesseract and Poppler installation
  ocr_enabled: false

  # Enable OpenDataLoader PDF extraction tier (between PyMuPDF and Marker)
  # Requires Java 11+ and opendataloader-pdf package
  opendataloader_enabled: false
  # OpenDataLoader mode: "fast" (Java-only, ~0.4s/page) or "hybrid" (AI-assisted)
  opendataloader_mode: "fast"
  # Managed OpenDataLoader hybrid pool. Fast remains the primary PDF mode,
  # but hybrid requests default to the fixed localhost GPU-backed servers
  # below when a paper or run selects hybrid routing.
  opendataloader_hybrid_enabled: true
  # If true, try hybrid after fast ODL yields insufficient text.
  opendataloader_hybrid_fallback: false
  opendataloader_hybrid_backend: "docling-fast"
  opendataloader_hybrid_client_mode: "auto"  # "auto" or "full"
  # Legacy single-endpoint override. Leave null to use the managed pool.
  opendataloader_hybrid_url: null
  # Bound hybrid requests so heavy picture/OCR enrichments cannot stall a run indefinitely.
  opendataloader_hybrid_timeout_ms: 60000
  # Legacy autostart for a single local backend. Managed pool mode never
  # autostarts; use `python scripts/manage_opendataloader_hybrid.py start`.
  opendataloader_hybrid_autostart: false
  opendataloader_hybrid_host: "127.0.0.1"
  opendataloader_hybrid_port: 5002
  opendataloader_hybrid_startup_timeout_seconds: 30.0
  # Hybrid backend profile flags from the upstream README.
  opendataloader_hybrid_force_ocr: false
  opendataloader_hybrid_ocr_lang: null
  opendataloader_hybrid_enrich_formula: false
  # Keep automatic picture-description hybrid routing disabled until the
  # backend is reliable enough to justify it. Manual hybrid runs can still opt
  # in via the explicit enrich flag below.
  opendataloader_hybrid_auto_picture_intents: false
  opendataloader_hybrid_enrich_picture_description: false
  opendataloader_hybrid_picture_description_prompt: null
  opendataloader_hybrid_device: "cuda"
  # Python install that owns the managed GPU hybrid launcher.
  opendataloader_hybrid_python_executable: "C:\\Users\\cmb17\\AppData\\Local\\Programs\\Python\\Python310\\python.exe"
  # Fixed localhost GPU server pool. URL matching is exact on the three
  # hybrid feature flags below: force_ocr, enrich_formula, and
  # enrich_picture_description.
  opendataloader_hybrid_servers:
    base:
      url: "http://127.0.0.1:5002"
      force_ocr: false
      enrich_formula: false
      enrich_picture_description: false
    ocr:
      url: "http://127.0.0.1:5003"
      force_ocr: true
      enrich_formula: false
      enrich_picture_description: false
    formula:
      url: "http://127.0.0.1:5004"
      force_ocr: false
      enrich_formula: true
      enrich_picture_description: false
    picture:
      url: "http://127.0.0.1:5005"
      force_ocr: false
      enrich_formula: false
      enrich_picture_description: true
    ocr_formula:
      url: "http://127.0.0.1:5006"
      force_ocr: true
      enrich_formula: true
      enrich_picture_description: false
    ocr_picture:
      url: "http://127.0.0.1:5007"
      force_ocr: true
      enrich_formula: false
      enrich_picture_description: true
    formula_picture:
      url: "http://127.0.0.1:5008"
      force_ocr: false
      enrich_formula: true
      enrich_picture_description: true
    ocr_formula_picture:
      url: "http://127.0.0.1:5009"
      force_ocr: true
      enrich_formula: true
      enrich_picture_description: true

  # Attempt OCR when initial text checks fail (recommended for scanned books)
  ocr_on_fail: true

  # Minimum text length (chars) to consider PDF extraction successful
  # PDFs with less text may be candidates for OCR
  min_text_length: 100

  # Skip likely non-publication attachments (fragments, forms, notes)
  # Uses simple heuristics on extracted text before LLM extraction
  skip_non_publications: false

  # Minimum words required to treat an attachment as a publication
  min_publication_words: 500

  # Minimum PDF pages required to treat an attachment as a publication
  min_publication_pages: 2

  # Minimum distinct academic section markers (abstract, introduction, references)
  # Set to 0 to disable section marker checks
  min_section_hits: 0

  # OCR-specific configuration (used when ocr_enabled is true)
  ocr_config:
    # DPI for PDF to image conversion (higher = better quality, slower)
    dpi: 300
    # Tesseract language code (eng, deu, fra, etc.)
    lang: "eng"

# =============================================================================
# Federated Search Configuration (Optional)
# =============================================================================
# Search across multiple LITRIS indexes simultaneously. Useful for:
# - Combining results from multiple Zotero libraries
# - Searching across research group indexes
# - Keeping separate indexes while searching together
#
# COMPATIBILITY REQUIREMENTS:
# - All indexes must use the same embedding model
# - Schema versions must be compatible (same major version)
# - Primary index is always searched; federated indexes are additive
federated:
  # Enable federated search
  enabled: false

  # Merge strategy for combining results:
  # - "interleave": Round-robin by score (recommended)
  # - "concat": Primary index results first, then others
  # - "rerank": Combined scoring across all indexes
  merge_strategy: "interleave"

  # Similarity threshold for deduplication (0.0-1.0)
  # Papers with similarity >= threshold are considered duplicates
  # 0.95 = near-identical papers (recommended)
  dedup_threshold: 0.95

  # Maximum results to retrieve from each index before merging
  max_results_per_index: 50

  # Additional indexes to search (add as needed)
  # indexes:
  #   - path: "/path/to/other/litris/index"
  #     label: "Colleague Library"
  #     enabled: true
  #     weight: 1.0  # Relevance weight (0.0-2.0)
  #
  #   - path: "/data/historical_archive/index"
  #     label: "Historical Archive"
  #     enabled: true
  #     weight: 0.8  # Lower weight for older papers
